<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Patient - Health Chronicle</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #f0f4f8; color: #333; }
        
        .navbar {
            background: #2c7be5;
            color: white;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .navbar h1 { font-size: 22px; cursor: pointer; }

        .container {
            max-width: 600px;
            margin: 40px auto;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.1);
        }

        h2 { margin-bottom: 24px; color: #2c7be5; }

        .form-group {
            margin-bottom: 18px;
        }

        label {
            display: block;
            margin-bottom: 6px;
            font-weight: bold;
            font-size: 14px;
            color: #555;
        }

        input, select, textarea {
            width: 100%;
            padding: 10px 14px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
            outline: none;
        }

        input:focus, select:focus {
            border-color: #2c7be5;
        }

        .btn {
            width: 100%;
            background: #2c7be5;
            color: white;
            padding: 12px;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 10px;
        }

        .btn:hover { background: #1a68d1; }

        .success {
            background: #d4edda;
            color: #155724;
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 16px;
            display: none;
        }

        .error {
            background: #f8d7da;
            color: #721c24;
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 16px;
            display: none;
        }
    </style>
</head>
<body>

<div class="navbar">
    <h1 onclick="window.location.href='index.html'">🏥 Health Chronicle</h1>
</div>

<div class="container">
    <h2>Add New Patient</h2>

    <div class="success" id="successMsg">Patient added successfully! ✅</div>
    <div class="error" id="errorMsg">Something went wrong. Please try again.</div>

    <div class="form-group">
        <label>Full Name *</label>
        <input type="text" id="name" placeholder="Enter patient's full name" />
    </div>

    <div class="form-group">
        <label>Age *</label>
        <input type="number" id="age" placeholder="Enter age" />
    </div>

    <div class="form-group">
        <label>Gender *</label>
        <select id="gender">
            <option value="">Select gender</option>
            <option value="Male">Male</option>
            <option value="Female">Female</option>
            <option value="Other">Other</option>
        </select>
    </div>

    <div class="form-group">
        <label>Medical Condition *</label>
        <input type="text" id="condition" placeholder="e.g. Diabetes, Hypertension" />
    </div>

    <div class="form-group">
        <label>Phone Number</label>
        <input type="text" id="phone" placeholder="Enter phone number" />
    </div>

    <div class="form-group">
        <label>Address</label>
        <input type="text" id="address" placeholder="Enter address" />
    </div>

    <button class="btn" onclick="addPatient()">Add Patient</button>
</div>

<script>
    async function addPatient() {
        const name = document.getElementById('name').value.trim();
        const age = document.getElementById('age').value;
        const gender = document.getElementById('gender').value;
        const condition = document.getElementById('condition').value.trim();
        const phone = document.getElementById('phone').value.trim();
        const address = document.getElementById('address').value.trim();

        if (!name || !age || !gender || !condition) {
            document.getElementById('errorMsg').style.display = 'block';
            document.getElementById('errorMsg').innerText = 'Please fill all required fields!';
            return;
        }

        try {
            const response = await fetch('http://localhost:5000/api/patients/add', {
    method: 'POST',
    headers: { 
        'Content-Type': 'application/json',
        'Authorization': 'Bearer ' + localStorage.getItem('token')
    },
    body: JSON.stringify({ name, age, gender, condition, phone, address })
});

            const data = await response.json();

            if (response.ok) {
                document.getElementById('successMsg').style.display = 'block';
                document.getElementById('errorMsg').style.display = 'none';
                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 1500);
            }
        } catch (error) {
            document.getElementById('errorMsg').style.display = 'block';
            document.getElementById('errorMsg').innerText = 'Error connecting to server!';
        }
    }
</script>

</body>
</html>
